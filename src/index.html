<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OnePrompt</title>
  <link rel="stylesheet" href="styles/main.css">
  <link rel="stylesheet" href="styles/feedback.css">
</head>
<body>
  <!-- Titlebar -->
  <div class="titlebar">
    <div class="titlebar-title">OnePrompt</div>
  </div>

  <div class="app-container">
    <!-- Sidebar laterale -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo" id="homeBtn" title="OnePrompt Home">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
        </div>
      </div>
      
      <div class="sidebar-content-wrapper">
        <div class="scroll-indicator up" id="scrollUpBtn">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"></polyline></svg>
        </div>
        
        <nav class="sidebar-nav" id="sidebarNav">
          <!-- Le icone AI verranno generate dinamicamente -->
        </nav>
        
        <div class="scroll-indicator down" id="scrollDownBtn">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
        </div>

        <div class="add-service-wrapper">
          <button class="sidebar-item add-service" id="addServiceBtn" title="Aggiungi servizio">
            <span class="sidebar-icon">+</span>
          </button>
        </div>
      </div>
      
      <div class="sidebar-footer">
        <button class="sidebar-item new-session" id="newSessionBtn" title="Nuova sessione">
          <span class="sidebar-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 20h9"></path>
              <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path>
            </svg>
          </span>
        </button>
        <button class="sidebar-item report-bug" id="reportBugBtn" title="Report Bug or Request Feature">
          <span class="sidebar-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"></path>
              <line x1="12" y1="9" x2="12" y2="13"></line>
              <line x1="12" y1="17" x2="12.01" y2="17"></line>
            </svg>
          </span>
        </button>
        <button class="sidebar-item settings" id="settingsBtn" title="Impostazioni">
          <span class="sidebar-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
          </span>
        </button>
      </div>
    </aside>

    <!-- Area principale -->
    <main class="main-area">
      <!-- Tab bar (nascosta quando c'è solo 1 tab) -->
      <div class="tab-bar" id="tabBar" style="display: none;">
        <div class="tab-list" id="tabList">
          <!-- Le tab verranno generate dinamicamente -->
          <!-- Il pulsante + verrà aggiunto dinamicamente dopo le tab -->
        </div>
      </div>
      <!-- Griglia webview (occupa la maggior parte dello schermo) -->
      <div id="webviewGrid" class="webview-grid">
        <!-- Le webviews verranno generate dinamicamente in griglia adattiva -->
      </div>

      <!-- Prompt control bar (fissa in basso) -->
      <div class="prompt-bar">
        <div class="prompt-bar-inner">
          <!-- Prompt input -->
          <div class="prompt-input-wrapper">
            <textarea
              id="promptInput"
              class="prompt-input"
              placeholder="Inserisci il tuo prompt qui..."
              rows="2"
            ></textarea>
          </div>
          <button id="sendBtn" class="btn-send" title="Invia">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
          </button>
        </div>
      </div>
    </main>
  </div>

  <!-- Modale servizi disponibili (stile Franz) -->
  <div class="modal-overlay" id="servicesModal" style="display: none;">
    <div class="modal-container">
      <div class="modal-header">
        <h2 data-i18n="services.title">Servizi disponibili</h2>
        <button class="modal-close" id="closeServicesModal">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      <div class="modal-content">
        <div class="services-grid" id="servicesGrid">
          <!-- I servizi verranno generati dinamicamente -->
        </div>
      </div>
    </div>
  </div>

  <!-- Modale impostazioni -->
  <div class="modal-overlay" id="settingsModal" style="display: none;">
    <div class="modal-container">
      <div class="modal-header">
        <h2 data-i18n="settings.title">Impostazioni</h2>
        <button class="modal-close" id="closeSettingsModal">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      <div class="modal-content">
        <div class="settings-section">
          <label class="settings-label" data-i18n="settings.theme">Tema</label>
          <div class="theme-selector">
            <button class="theme-btn active" data-theme="dark" id="themeDarkBtn">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
              <span data-i18n="settings.theme.dark">Scuro</span>
            </button>
            <button class="theme-btn" data-theme="light" id="themeLightBtn">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
              <span data-i18n="settings.theme.light">Chiaro</span>
            </button>
          </div>
        </div>

        <div class="settings-section">
          <label class="settings-label" data-i18n="settings.language">Lingua</label>
          <select id="languageSelect" class="settings-select">
            <option value="it">Italiano</option>
            <option value="en">English</option>
          </select>
        </div>
      </div>
    </div>
  </div>

  <!-- Modale Feedback -->
  <div class="modal-overlay" id="feedbackModal" style="display: none;">
    <div class="modal-container">
      <div class="modal-header">
        <h2 data-i18n="feedback.title">Invia Feedback</h2>
        <button class="modal-close" id="closeFeedbackModal">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      <div class="modal-content">
        <div class="feedback-form" id="feedbackForm">
          <div class="form-group">
            <label class="form-label" data-i18n="feedback.type">Tipo</label>
            <select id="feedbackType" class="form-select">
              <option value="bug" data-i18n="feedback.type.bug">Segnala un Bug</option>
              <option value="feature" data-i18n="feedback.type.feature">Richiedi Funzionalità</option>
              <option value="other" data-i18n="feedback.type.other">Altro</option>
            </select>
          </div>
          
          <div class="form-group">
            <label class="form-label" data-i18n="feedback.message">Messaggio</label>
            <textarea id="feedbackMessage" class="form-textarea" rows="5"></textarea>
          </div>

          <div class="form-group">
            <label class="form-label" data-i18n="feedback.email">Email (opzionale)</label>
            <input type="email" id="feedbackEmail" class="form-input" placeholder="name@example.com">
          </div>

          <div class="form-actions">
            <button id="submitFeedbackBtn" class="btn-primary" data-i18n="feedback.submit">Invia</button>
          </div>
        </div>

        <div class="feedback-success" id="feedbackSuccess" style="display: none;">
          <img src="../assets/logo/logo.png" alt="OnePrompt" class="feedback-logo">
          <h3 data-i18n="feedback.success">Grazie per il tuo feedback!</h3>
          <button id="closeFeedbackSuccessBtn" class="btn-primary" data-i18n="close">Chiudi</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Analytics Consent Banner -->
  <div id="analyticsBanner" class="analytics-banner" style="display: none;">
    <div class="analytics-content">
      <p class="analytics-text" data-i18n="analytics.text">Mi aiuti a capire se OnePrompt è utile? Conto solo quante volte l'app viene aperta, in forma totalmente anonima. Nessun altro dato viene toccato.</p>
      <div class="analytics-buttons">
        <button id="analyticsDecline" class="analytics-btn secondary" data-i18n="analytics.decline">Preferisco di no</button>
        <button id="analyticsAccept" class="analytics-btn primary" data-i18n="analytics.accept">Nessun problema</button>
      </div>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
